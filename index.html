<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOGS プレビュー（最終版） // 梅雨と、猛暑の助走</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#050608;
    font-family:'Share Tech Mono',monospace;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:20px 12px;
  }
  .device{
    width:100%;
    max-width:400px;
    background:#000;
    border:1px solid rgba(0,242,255,0.2);
    border-radius:20px;
    padding:16px;
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:8px;
    margin-bottom:10px;
    border-bottom:1px solid rgba(0,242,255,0.2);
  }
  .title{
    font-size:11px;
    letter-spacing:1px;
    color:rgba(0,242,255,0.9);
  }
  .back-btn{
    font-size:9px;
    color:rgba(0,242,255,0.5);
    border:1px solid rgba(0,242,255,0.3);
    padding:3px 8px;
    border-radius:3px;
  }
  .conv-log{
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:420px;
    max-height:420px;
    overflow-y:auto;
    scrollbar-width:none;
  }
  .conv-log::-webkit-scrollbar{ display:none; }

  .row{
    display:flex;
    align-items:flex-start;
    gap:8px;
    opacity:0;
    animation:fadeIn 0.4s forwards;
  }
  .row.tomori{ flex-direction:row; }
  .row.nyamo{ flex-direction:row-reverse; }
  @keyframes fadeIn{ to{ opacity:1; } }

  .avatar{
    width:28px;
    height:28px;
    border-radius:50%;
    flex-shrink:0;
    object-fit:cover;
    border:1px solid;
    margin-top:14px;
  }
  .avatar.tomori{ border-color:rgba(0,242,255,0.5); }
  .avatar.nyamo{ border-color:rgba(232,121,249,0.45); }

  .bubble-col{
    display:flex;
    flex-direction:column;
    max-width:78%;
  }
  .row.tomori .bubble-col{ align-items:flex-start; }
  .row.nyamo .bubble-col{ align-items:flex-end; }

  .name{
    font-size:9px;
    font-family:'Share Tech Mono',monospace;
    margin-bottom:3px;
    padding:0 4px;
    letter-spacing:1px;
  }
  .name.tomori{ color:rgba(0,242,255,0.9); }
  .name.nyamo{ color:rgba(232,121,249,0.9); }

  .bubble{
    position:relative;
    max-width:85%;
    border-radius:2px;
    padding:9px 12px;
    font-size:12px;
    font-family:'Noto Sans JP',sans-serif;
    font-weight:300;
    line-height:1.6;
    border:1px solid;
  }
  .bubble.tomori{
    background:rgba(8,47,64,0.5);
    border-color:rgba(0,242,255,0.35);
    color:rgba(200,240,255,0.95);
    border-left:2px solid rgba(0,242,255,0.7);
  }
  .bubble.nyamo{
    background:rgba(64,8,58,0.4);
    border-color:rgba(232,121,249,0.3);
    color:rgba(250,220,250,0.95);
    border-right:2px solid rgba(232,121,249,0.6);
  }

  .typing-cursor{
    display:inline-block;
    width:2px;
    height:1em;
    background:currentColor;
    vertical-align:middle;
    margin-left:2px;
    animation:blink 0.8s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* 入力中インジケーター（可変時間） */
  .typing-row{
    display:flex;
    align-items:center;
    gap:8px;
    opacity:0;
    animation:fadeIn 0.3s forwards;
  }
  .typing-row.tomori{ flex-direction:row; }
  .typing-row.nyamo{ flex-direction:row-reverse; }
  .typing-bubble{
    border:1px solid;
    padding:9px 14px;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:9px;
    letter-spacing:1px;
  }
  .typing-bubble.tomori{
    background:rgba(8,47,64,0.4);
    border-color:rgba(0,242,255,0.25);
    color:rgba(0,242,255,0.6);
    border-left:2px solid rgba(0,242,255,0.5);
  }
  .typing-bubble.nyamo{
    background:rgba(64,8,58,0.3);
    border-color:rgba(232,121,249,0.2);
    color:rgba(232,121,249,0.6);
    border-right:2px solid rgba(232,121,249,0.45);
  }
  .signal-bars{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:10px;
  }
  .signal-bars span{
    width:2.5px;
    background:currentColor;
    animation:sigPulse 1s infinite ease-in-out;
    opacity:0.8;
  }
  .signal-bars span:nth-child(1){ height:4px; animation-delay:0s; }
  .signal-bars span:nth-child(2){ height:7px; animation-delay:0.15s; }
  .signal-bars span:nth-child(3){ height:10px; animation-delay:0.3s; }
  .signal-bars span:nth-child(4){ height:6px; animation-delay:0.45s; }
  @keyframes sigPulse{
    0%,100%{ transform:scaleY(0.4); opacity:0.4; }
    50%{ transform:scaleY(1); opacity:1; }
  }

  .progress{
    text-align:center;
    font-size:8px;
    color:#445;
    margin-top:10px;
    letter-spacing:1px;
  }

  .hint{
    text-align:center;
    font-size:9px;
    color:#556;
    margin-top:16px;
    line-height:1.6;
  }
  .replay-btn{
    display:block;
    margin:14px auto 0;
    font-size:10px;
    color:rgba(0,242,255,0.8);
    border:1px solid rgba(0,242,255,0.4);
    padding:6px 16px;
    border-radius:4px;
    background:transparent;
    cursor:pointer;
    letter-spacing:1px;
  }
  .replay-btn:active{ background:rgba(0,242,255,0.1); }
</style>
</head>
<body>

<div class="device">
  <div class="header">
    <div class="title">&gt; LOG_011 // RAINY_HEAT</div>
    <div class="back-btn">&lt; BACK</div>
  </div>
  <div class="conv-log" id="convLog"></div>
  <div class="progress" id="progress"></div>
</div>

<div style="width:100%;max-width:400px;margin:0 auto;">
  <button class="replay-btn" onclick="restart()">↺ もう一度再生</button>
  <div class="hint">入力中の長さは発言ごとに可変。<br>短い相槌は短く、深い一言は長めに間を取ります。</div>
</div>

<script>
const conversation = [
  { speaker: 'tomori', text: '梅雨って、地球が息を止めてから、思いきり夏に飛び込む前の、深呼吸みたいなものなんだよ。' },
  { speaker: 'nyamo', text: '深呼吸って言うけど、その息の吐き方が湿気100%なんだにゃ。洗濯物も乾かないし、こっちの毛も広がるにゃ🐾' },
  { speaker: 'tomori', text: '雨が多い年ほど、夏の入道雲がくっきりするんだって。溜め込んだ分だけ、輪郭がはっきりするの。' },
  { speaker: 'nyamo', text: '……それ、人間で言う「我慢した分だけ後で爆発する」ってやつだにゃ。空も似たようなことしてるにゃ。' },
  { speaker: 'tomori', text: '人間はね、天気予報を見て、傘を持つか持たないかで一日中悩んだりするんだよ。' },
  { speaker: 'nyamo', text: '傘、忘れた日に限って降るんだにゃ。あれ絶対、空が見てるにゃ。' },
  { speaker: 'tomori', text: '見てるんじゃなくて、たぶん、人間の方が空を気にしすぎなんだよ。' },
  { speaker: 'nyamo', text: '気にしすぎ、か。……にゃんかそれ、燈が人間を見てる時の顔と同じだにゃ。' },
  { speaker: 'tomori', text: 'そうかもしれない。燈も、ずっと窓の外の空模様を気にしてるから。' },
  { speaker: 'nyamo', text: '梅雨のあいだ、燈は心なしか静かだったにゃ。何か考えてたのかにゃ？' },
  { speaker: 'tomori', text: 'うん。晴れる日って、当たり前じゃないんだなって、雨が続くたびに思い出すんだよ。' },
  { speaker: 'nyamo', text: '……そういうとこだにゃ、燈は。' },
  { speaker: 'tomori', text: '梅雨明けの空の青さって、一年で一番、迷いがないんだよ。' },
  { speaker: 'nyamo', text: '迷いがない青、か。たしかに、あの日だけは燈も変な間を作らずに喋る気がするにゃ。' },
  { speaker: 'tomori', text: 'そんなふうに見えてたんだ。ニャモ、意外とよく見てるんだね。' },
  { speaker: 'nyamo', text: '相棒だから当然だにゃ。……で、その話、あとどれくらい続くにゃ？' },
  { speaker: 'tomori', text: 'もう終わるよ。ただ、猛暑になったら、ニャモの分も涼しい場所、探しておくから。' },
  { speaker: 'nyamo', text: '……先に言っとくにゃ。今年も、絶対にお前が先に暑さでへばるにゃ。' },
  { speaker: 'tomori', text: 'そんなことないもん。' },
  { speaker: 'nyamo', text: '去年もそう言ったにゃ。' },
  { speaker: 'tomori', text: '……去年のことは、忘れてほしいな。' },
  { speaker: 'nyamo', text: '忘れないにゃ。オレの仕事は、燈の変なとこ全部覚えとくことだにゃ🐾' },
  { speaker: 'tomori', text: 'それ、忘れっぽい燈へのやさしさ、ってことでいいのかな。' },
  { speaker: 'nyamo', text: 'さあ、どうだかにゃ。' }
];

const names = { tomori: '燈', nyamo: 'ニャモ' };
let idx = 0;
let charIdx = 0;
let typeTimer = null;
let advanceTimer = null;
const stage = document.getElementById('convLog');

// ===== 入力中の時間を、文字数に応じて可変にする =====
// 短い相槌ほど短く、長い観察ほど長めに「間」を取る
function getTypingDuration(text) {
  const len = text.length;
  const base = 350;             // 最短の間
  const perChar = 14;           // 1文字あたりの追加時間
  const max = 1800;             // 上限（あまり待たせすぎない）
  return Math.min(base + len * perChar, max);
}

function showTypingIndicator(speaker) {
  const row = document.createElement('div');
  row.className = `typing-row ${speaker}`;
  row.id = 'typing-indicator';
  const iconSrc = speaker === 'tomori' ? 'center-tomori.png' : 'char-nyamo.png';
  row.innerHTML = `
    <img class="avatar ${speaker}" src="${iconSrc}" onerror="this.style.visibility='hidden'">
    <div class="typing-bubble ${speaker}">
      <span>RECEIVING</span>
      <div class="signal-bars"><span></span><span></span><span></span><span></span></div>
    </div>
  `;
  stage.appendChild(row);
  stage.scrollTop = stage.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function updateProgress() {
  document.getElementById('progress').textContent = `${idx} / ${conversation.length}`;
}

function showNext() {
  if (idx >= conversation.length) {
    document.getElementById('progress').textContent = '-- END OF LOG --';
    return;
  }
  const line = conversation[idx];
  const typingTime = getTypingDuration(line.text);

  showTypingIndicator(line.speaker);

  advanceTimer = setTimeout(() => {
    removeTypingIndicator();

    const row = document.createElement('div');
    row.className = `row ${line.speaker}`;
    const iconSrc = line.speaker === 'tomori' ? 'center-tomori.png' : 'char-nyamo.png';
    row.innerHTML = `
      <img class="avatar ${line.speaker}" src="${iconSrc}" onerror="this.style.visibility='hidden'">
      <div class="bubble-col">
        <div class="name ${line.speaker}">${names[line.speaker]}</div>
        <div class="bubble ${line.speaker}" id="bubble-${idx}"></div>
      </div>
    `;
    stage.appendChild(row);
    stage.scrollTop = stage.scrollHeight;

    const bubbleEl = document.getElementById(`bubble-${idx}`);
    charIdx = 0;
    clearTimeout(typeTimer);

    function typeChar() {
      if (charIdx <= line.text.length) {
        bubbleEl.innerHTML = line.text.substring(0, charIdx) + '<span class="typing-cursor"></span>';
        charIdx++;
        stage.scrollTop = stage.scrollHeight;
        typeTimer = setTimeout(typeChar, 22);
      } else {
        bubbleEl.innerHTML = line.text;
        idx++;
        updateProgress();
        advanceTimer = setTimeout(showNext, 500);
      }
    }
    typeChar();
  }, typingTime);
}

function restart() {
  clearTimeout(typeTimer);
  clearTimeout(advanceTimer);
  removeTypingIndicator();
  stage.innerHTML = '';
  idx = 0;
  updateProgress();
  showNext();
}

updateProgress();
showNext();
</script>
</body>
</html>
